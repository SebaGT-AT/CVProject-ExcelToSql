version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: data-importer-pro-db
    environment:
      POSTGRES_DB: data_importer_pro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d data_importer_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: data-importer-pro-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: data_importer_pro
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: 12345678901234567890123456789012
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: data-importer-pro-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:

